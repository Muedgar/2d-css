<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: aquamarine;
        }
        .cartoon {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 500px;
            height: 500px;
        }

        .face {
            background-color: rgba(233, 182, 112, 0.795);
            width: 70%;
            height: 80%;
            border: 1vmin solid rgba(233, 182, 112, 0.795);
            border-radius: 100% / 120% 120% 80% 80%;
            border-left: .84 solid black;
            transform: translate(25%, 0) rotate(-20deg);
        }

        .forehead {
            width: 80%;
            height: 70%;
            background-color: rgba(233, 182, 112, 0.795);
            border: 1vmin solid rgba(233, 182, 112, 0.795);
            border-radius: 50%;
            position: absolute;
            bottom: 50%;
            left: 15%;
        }

        .eyes {
            width: 100%;
            height: 20%;
            position: absolute;
            bottom: 65%;
        }

        .eyes::before {
            content: "";
            width: 20%;
            height: 100%;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 25%;
            background: 
               radial-gradient(circle at 52% 52%, black 20%, white 20%);
            background-repeat: no-repeat;
        }
        
        .eyes::after {
            content: "";
            width: 20%;
            height: 100%;
            border-radius: 50%;
            position: absolute;
            top: 0;
            right: 25%;
            background: 
               radial-gradient(circle at 52% 52%, black 20%, white 20%);
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <div class="cartoon">
        <div class="face"></div>
        <div class="forehead"></div>
        <div class="eyes"></div>
    </div>
</body>
</html>
