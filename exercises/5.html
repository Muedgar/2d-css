<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #3338;
        }

        .cartoon {
            width: 60%;
            height: 60%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, 0);
        }

        .mouth {
            width: 30%;
            height: 30%;
            border: .4vmin solid;
            border-radius: 100% / 50% 50% 120% 120%;
            border-left: .84vmin solid transparent;
            border-right: .84vmin solid transparent;
            border-top: .84vmin solid transparent;
            transform: rotate(7deg)
        }

        .mouth::before {

        }
    </style>
</head>
<body>
    <div class="cartoon">
        <div class="mouth"></div>
    </div>
</body>
</html>
