<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #3844;
            box-sizing: border-box;
        }
 
        .cartoon {
            width: 60%;
            height: 60%;
            position: absolute;
            bottom: 0%;
            left: 50%;
            transform: translate(-50%, 0);
        }

        .cartoon div {
            position: absolute;
        }

        .ear {
  width: 20%;
  height: 30%;
  border-radius: 100% / 80% 80% 120% 125%;
  border: 0.75vmin solid;
  border-right: 1.125vmin solid var(--skin);
  border-left: 1.1vmin solid;
  background: var(--skin);
  top: 50%;
  left: 5%;
  transform: rotate(-12deg);
}

.ear::before {
  width: 70%;
  height: 60%;
  border: 1.25vmin solid transparent;
  border-top: 0.75vmin solid;
  border-right: 0.5vmin solid;
  border-radius: 50%;
  top: 22%;
  right: 15%;
  box-shadow: inset -1.5vmin 2vmin 1vmin -0.5vmin var(--skin-dark);
}
    </style>
</head>
<body>
    <div class="cartoon">
        <div class="ear"></div>
    </div>
</body>
</html>
