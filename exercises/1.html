<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      box-sizing: 0;
    }

    .eyes {
      width: 100px;
      height: 100px;
      border: .3vmin solid;
      border-radius: 50%;
      position: relative;
    }

    .eyes::before {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: yellow;
      content: "";
      position: absolute;
      top: 0;
      background: 
        radial-gradient(100% 100% at 70% 70%, black 20%, white 20%) 10% 10% / 80% 80%
      ;
      background-repeat: no-repeat;
    }

  </style>
</head>
<body>
  <div class="eyes"></div>
</body>
</html>
