<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #e334;
    }

    .cartoon {
      width: 600px;
      height: 600px;
      border: 1vmin solid;
      position: absolute;
      left: 50%;
      top: 15%;
      transform: translate(-50%, 0);
    }

    .forehead {
      width: 80%;
      height: 80%;
      border: 1vmin solid;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translate(-50%, 0);
    }

    .face {
      width: 80%;
      height: 80%;
      border: 1vmin solid;
      border-radius: 100% / 120% 120% 80% 80%;
      border-left: .15vmin solid transparent;
      border-top: 1vmin solid transparent;
      position: absolute;
      left: 20%;
      top: 22%;
    }

  </style>
</head>
<body>
  <div class="cartoon">
    <div class="forehead"></div>
    <div class="face"></div>
  </div>
</body>
</html>
