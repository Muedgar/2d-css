<!-- forehead and face -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #fe34;
    }

    .cartoon {
      width: 80%;
      height: 80%;
      border: 1vmin solid;
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translate(-50%, 0);
    }

    .cartoon div {
      position: absolute
    }

    .forehead {
      width: 60%;
      height: 60%;
      border: 1vmin solid;
      border-radius: 50%;
      left: 20%;
      top: 10%;
      border-bottom: 1vmin solid transparent;
    }

    .face {
      width: 60%;
      height: 60%;
      border: 1vmin solid;
      left: 25%;
      bottom: 5%;
      border-radius: 100% / 120% 120% 80% 80%;
      transform: scaleX(-1) rotate(10deg);
      border-top: 1vmin solid transparent;
    }
  </style>
</head>
<body>
  <div class="cartoon">
    <div class="forehead"></div>
    <div class="face"></div>
  </div>
</body>
</html>
