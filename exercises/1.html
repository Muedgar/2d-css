<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ff88;
    }

    .cartoon {
      width: 600px;
      height: 700px;
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translate(-50%, 0);
      border: 1vmin solid;
    }

    .cartoon div {
      box-sizing: border-box;
      position: absolute;
    }

    .forehead {
      width: 75%;
      height: 75%;
      border-radius: 50%;
      border: 1vmin solid;
      left: 13%;
      top: 5%;
    }

    .face {
      width: 80%;
      height: 80%;
      border: 1vmin solid;
      border-radius: 100% / 120% 100% 80% 80%;
      border-bottom: 1vmin solid transparent;
      border-left: .7vmin solid;
      border-right: .09vmin solid transparent;
      bottom: 0%;
      left: 11%;
      transform: scale(-1) rotate(10deg);
    }
  </style>
</head>
<body>
  <div class="cartoon">
    <div class="forehead"></div>
    <div class="face"></div>
  </div>
</body>
</html>
