### 1. A Human Hand in Perspective

Hands are famously difficult because they combine:

* **Anatomy** (bones, joints, tendons)
* **Perspective** (fingers pointing toward the viewer)
* **Subtle proportions**

Why it's complex:

* Many small shapes interacting
* Easy to make look unnatural
* Requires strong observation

---

### 2. A Busy City Street

This is like **drawing an entire system**.

Challenges:

* Linear perspective
* Many objects (cars, buildings, signs, people)
* Depth and scale

It's similar to designing a **complex UI layout**, but with a pencil.

---

### 3. A Mechanical Watch (Inside View)

This is extremely intricate.

Challenges:

* Dozens of tiny gears
* Precise mechanical shapes
* Repeating patterns

Great if you like **engineering precision**.

---

### 4. A Human Face with Realistic Lighting

Faces are difficult because humans instantly notice mistakes.

Challenges:

* Symmetry
* Subtle shading
* Expression

Even a **1–2 mm mistake** can change the whole face.

---

### 5. A Forest Scene with Many Trees

Nature scenes are deceptively complex.

Challenges:

* Thousands of leaves
* Depth layers
* Random but believable structure

---

Glass is hard because you're drawing **light instead of the object**.

Challenges:

* Transparency
* Distorted reflections
* Strong highlights
