<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #fea;
        }

        .face {
            width: 70vmin;
            height: 85vmin;
            border: 1vmin solid;
            border-radius: 100% / 70% 70% 125% 125%;
            position: absolute;
            left: 50%;
            bottom: 10%;
            transform: translate(-50%, 0);
        }

        .lower-lip {
            width: 20%;
            height: 2.4%;
            background: black;
            border-radius: 85% 85% 170% 170%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, 0);
            bottom: 30%;
        }

        .lower-lip::before {
            content: "";
            position: absolute;
            left: -5%;
            top: 30%;
            width: 20%;
            height: 20%;
            background: black;
        }

        .lower-lip::after {
            content: "";
            position: absolute;
            right: -5%;
            top: 30%;
            width: 20%;
            height: 20%;
            background: black;
        }

        .upper-lip {
            width: 10%;
            height: .3%;
            background: #fea;
            position: absolute;
            border-radius: 100% / 90% 90% 90% 90%;
            bottom: 31%;
            left: 45%;
        }

        .nose {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 139, 57, 0.916);
            background-repeat: no-repeat;
            position: absolute;
            bottom: 40%;
            left: 46%;
            box-shadow: inset 0px 0px 1px 1px rgba(0, 0, 0, 0.288);
        }

        .nose::after {
            content: "";
            position: absolute;
            bottom: -3px;
            width: 6px;
            height: 6px;
            background-color: black;
            border-radius: 50%;
            left: 7px;
        }

        .nose::before {
            content: "";
            position: absolute;
            bottom: -3px;
            width: 6px;
            height: 6px;
            background-color: black;
            border-radius: 50%;
            right: 7px;
        }

    </style>
</head>
<body>
    <div class="cartoon">
        <div class="face"></div>
        <div class="lower-lip"></div>
        <div class="upper-lip"></div>
        <div class="nose"></div>
    </div>
</body>
</html>
