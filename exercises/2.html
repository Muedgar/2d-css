<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #fea;
        }

        .face {
            width: 70vmin;
            height: 85vmin;
            border: 1vmin solid;
            border-radius: 100% / 70% 70% 125% 125%;
            position: absolute;
            left: 50%;
            bottom: 10%;
            transform: translate(-50%, 0);
        }

        .lower-lip {
            width: 20%;
            height: 2.4%;
            background: black;
            border-radius: 85% 85% 170% 170%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, 0);
            bottom: 30%;
        }

        .lower-lip::before {
            content: "";
            position: absolute;
            left: -5%;
            top: 30%;
            width: 20%;
            height: 20%;
            background: black;
        }

        .lower-lip::after {
            content: "";
            position: absolute;
            right: -5%;
            top: 30%;
            width: 20%;
            height: 20%;
            background: black;
        }

        .upper-lip {
            width: 10%;
            height: .3%;
            background: #fea;
            position: absolute;
            border-radius: 100% / 90% 90% 90% 90%;
            bottom: 31%;
            left: 45%;
        }

    </style>
</head>
<body>
    <div class="cartoon">
        <div class="face"></div>
        <div class="lower-lip"></div>
        <div class="upper-lip"></div>
    </div>
</body>
</html>
