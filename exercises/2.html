<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            overflow: hidden;
            background: #7c66;
        }

        .cartoon {
            position: absolute;
            bottom: 0%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 80vmin;
            height: 80vmin;
        }

        .cartoon div {
            position: absolute;
            box-sizing: border-box;
        }

        .b {
            border: 0.5vmin solid;
        }

        .r {
            border-radius: 100%;
        }

        .hb::before,
        .ha::after {
            content: "";
            display: block;
            position: absolute;
            box-sizing: border-box;
        }

        .cartoon {
            --skin: #7c6;
            --line: #222;
            --eye: #ffa;
            --tooth: #ff9;
            --mouth: #0002;
            --iris: #369c;
            --tongue: #f00a;
            color: var(--line);
        }

        .body {
            width: 60%;
            height: 70%;
            background: var(--skin);
            border-radius: 100% / 120% 120% 65% 60%;
            top: 10%;
            left: 50%;
            transform: translate(-50%, 0);
            overflow: hidden;
        }

        .eye {
            width: 55%;
            height: 46%;
            top: 15%;
            left: 50%;
            transform: translate(-50%, 0);
            box-shadow: 0 0 0 2vmin var(--skin), -2vmin -2vmin 0 -0.5vmin, 2vmin -2vmin 0 -0.5vmin;
            background: var(--eye);
            box-shadow: inset 0 0 4vmin -2.5vmin var(--tongue);
        }

        .eye::before {
            width: 12vmin;
            height: 12vmin;
            background: var(--line);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2vmin var(--iris);
        }

        .eye::after {
            width: 3vmin;
            height: 3vmin;
            background: #fff;
            border-radius: 50%;
            top: 25%;
            left: 60%;
            box-shadow: 2vmin 2vmin 0 -0.75vmin #fff, 2.5vmin 0.5vmin 0 -1.1vmin #fff;
        }

        .mouth {
            width: 80%;
            height: 70%;
            top: 23%;
            left: 55%;
            transform: translate(-50%, 0) rotate(33deg);
            border: 0.5vmin solid transparent;
            border-right: 0.25vmin solid transparent;
            border-bottom:  0.5vmin solid;
            box-shadow:  0 0 0 5vmin var(--skin), inset -3vmin 8vmin var(--skin), inset 35vmin -4vmin var(--mouth);
        }

        .mouth::before {
            width: 120%;
            height: 130%;
            background: var(--skin);
            border-radius: 50%;
            transform: rotate(-30deg);
            border: 0.5vmin solid transparent;
            border-bottom: 0.5vmin solid;
            border-right: 0.3vmin solid transparent;
            top: -39%;
            left: -34%;
        }

        .mouth::after {
            width: 5vmin;
            height: 5vmin;
            border: 0.5vmin solid transparent;
            border-left: 0.5vmin solid;
            border-radius: 50%;
            top: 82.5%;
            left: 13.5%;
            transform: rotate(20deg);
        }

        .fang {
            width: 10%;
            height: 9%;
            background: var(--tooth);
            top: 72.5%;
            left: 56%;
            transform: rotate(45deg) skew(10deg);
        }
    </style>
</head>
<body>
    <div class="cartoon hb">
        <div class="horn r ha"></div>
        <div class="horn r ha"></div>
        <div class="leg hb ha"></div>
        <div class="leg hb ha"></div>
        <div class="body b">
            <div class="tongue b"></div>
            <div class="fang b ha"></div>
            <div class="mouth r ha hb"></div>
            <div class="eye b r ha hb"></div>
        </div>
        <div class="correction ha r"></div>
    </div>
</body>
</html>
