<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cartoon {
            position: absolute;
            bottom: 40%;
            left: 50%;
            transform: translate(-50%, 0);
        }
        .face {
            width: 300px;
            height: 300px;
            background-color: bisque;
            border-radius: 100% / 120% 120% 80% 80%;
            border: 0.7vmin solid;
            border-bottom: 1vmin solid;
            border-top-color: bisque;
            border-left: 0.1vmin solid bisque;
            transform: translate(-50%, 0) rotate(-15deg)
        }
    </style>
</head>
<body>
    <div class="cartoon">
        <div class="face"></div>
    </div>
</body>
</html>
