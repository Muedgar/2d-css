<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .head {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translate(-50%, 0);
            width: 500px;
            height: 500px;
            background-color: antiquewhite;
        }

        .eyes {
            width: 90%;
            height: 400px;
            background: 
                linear-gradient(0deg, transparent 64%, antiquewhite 64%) 65% 90% / 77% 100%,
                linear-gradient(0deg, transparent 98%, black 98%) 65% 90% / 77% 60%,
                radial-gradient(circle at 40% 50%, black 4%, white 4%, transparent 4%) 50% 10% / 100% 100%,
                radial-gradient(circle at 86% 50%, black 4%, white 4%, transparent 4%) 50% 10% / 100% 100%,
                radial-gradient(circle at 30% 50%, white 23%, black 23%, transparent 24%) 50% 10% / 100% 100%,
                radial-gradient(circle at 75% 50%, white 23%, black 23%, transparent 24%) 50% 10% / 100% 100%
            ;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <div class="head">
        <!-- eyes -->
        <div class="eyes"></div>
    </div>
</body>
</html>
